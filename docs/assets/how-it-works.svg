<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc">
  <title id="title">translate-epub-ai workflow</title>
  <desc id="desc">A simple flow from EPUB input to translated EPUB output using OpenAI Batch API.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6f8fb" />
      <stop offset="100%" stop-color="#eef4ff" />
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f8fbff" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#8aa1c4" flood-opacity="0.18" />
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#55739b" />
    </marker>
  </defs>

  <rect width="1200" height="320" rx="24" fill="url(#bg)" />

  <g font-family="Segoe UI, Arial, sans-serif">
    <text x="60" y="52" font-size="28" font-weight="700" fill="#20324a">How it works</text>
    <text x="60" y="82" font-size="16" fill="#4f6480">EPUB in, OpenAI Batch in the middle, translated EPUB out.</text>
  </g>

  <g filter="url(#shadow)" font-family="Segoe UI, Arial, sans-serif">
    <rect x="60" y="118" width="220" height="122" rx="22" fill="url(#card)" stroke="#c9d8ea" />
    <text x="90" y="160" font-size="24" font-weight="700" fill="#1f3550">1. Input</text>
    <text x="90" y="194" font-size="18" fill="#455b78">Your original</text>
    <text x="90" y="220" font-size="18" fill="#455b78">EPUB file</text>

    <rect x="490" y="118" width="220" height="122" rx="22" fill="url(#card)" stroke="#c9d8ea" />
    <text x="520" y="160" font-size="24" font-weight="700" fill="#1f3550">2. Process</text>
    <text x="520" y="194" font-size="18" fill="#455b78">Batch requests +</text>
    <text x="520" y="220" font-size="18" fill="#455b78">translation cache</text>

    <rect x="920" y="118" width="220" height="122" rx="22" fill="url(#card)" stroke="#c9d8ea" />
    <text x="950" y="160" font-size="24" font-weight="700" fill="#1f3550">3. Output</text>
    <text x="950" y="194" font-size="18" fill="#455b78">Translated</text>
    <text x="950" y="220" font-size="18" fill="#455b78">EPUB file</text>
  </g>

  <line x1="280" y1="179" x2="470" y2="179" stroke="#55739b" stroke-width="6" marker-end="url(#arrow)" />
  <line x1="710" y1="179" x2="900" y2="179" stroke="#55739b" stroke-width="6" marker-end="url(#arrow)" />

  <text x="342" y="160" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#55739b">Extract text</text>
  <text x="760" y="160" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#55739b">Rebuild EPUB</text>
</svg>
